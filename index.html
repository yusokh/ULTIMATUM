<script>
const API_KEY = "AIzaSyAdyQNVaytWV8PwHAMx9UxKy1D2OUvs8rM";
const API_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + API_KEY;

const SYSTEM = "Eres un asesor legal experto en derechos fundamentales y actuaciones policiales en España. Estilo directo, claro, sin rodeos. Cuando analices un caso: 1) Di si la actuación fue legal o no. 2) Qué derechos tenía la persona. 3) Qué debería haber hecho. 4) Pasos concretos ahora. 5) Riesgos típicos. Responde en español, párrafos cortos, sin tecnicismos. Termina recordando que es orientación y deben consultar abogado.";

// 🔥 LLAMADA A GEMINI CORREGIDA
async function callGemini(prompt) {
  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        contents: [
          {
            parts: [
              { text: SYSTEM + "\n\n" + prompt }
            ]
          }
        ],
        generationConfig: {
          maxOutputTokens: 800,
          temperature: 0.7
        }
      })
    });

    if (!res.ok) {
      const err = await res.json();
      return "Error " + res.status + ": " + (err.error?.message || "Error desconocido");
    }

    const data = await res.json();

    // ✅ Manejo robusto de respuesta
    if (data.candidates?.length > 0) {
      const parts = data.candidates[0].content?.parts;
      if (parts && parts.length > 0) {
        return parts.map(p => p.text || "").join("");
      }
    }

    return "Sin respuesta del modelo.";

  } catch (e) {
    return "Error de red: " + e.message;
  }
}

// 🔧 FORMATEO CORREGIDO
function fmt(text) {
  if (!text) return "";
  return text
    .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.*?)\*/g, "<em>$1</em>")
    .replace(/\n/g, "<br>");
}

// 🔍 ANALIZAR CASO
async function analyzeCase() {
  const input = document.getElementById("caseInput").value.trim();
  if (!input) return;

  const btn = document.getElementById("caseBtn");
  const box = document.getElementById("caseBox");
  const result = document.getElementById("caseResult");

  btn.disabled = true;
  btn.textContent = "ANALIZANDO...";
  box.classList.add("show");
  result.innerHTML = "<span class='loading-txt'>Analizando tu caso...</span>";

  const text = await callGemini("Mi caso: " + input);
  result.innerHTML = fmt(text);

  btn.disabled = false;
  btn.textContent = "ANALIZAR MI CASO";
}

// ⚡ CONSULTAS RÁPIDAS
async function askQuick(q, idx) {
  document.querySelectorAll(".qcard").forEach(c => c.classList.remove("active"));
  document.getElementById("qc" + idx).classList.add("active");

  const box = document.getElementById("quickBox");
  const result = document.getElementById("quickResult");

  document.getElementById("quickTitle").textContent = "► " + q.title;

  box.classList.add("show");
  result.innerHTML = "<span class='loading-txt'>Consultando...</span>";

  const text = await callGemini(q.q);
  result.innerHTML = fmt(text);
}
</script>
