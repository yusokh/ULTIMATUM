<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asesor Legal</title>
<style>
body {
  background: #0a0a0f;
  color: white;
  font-family: Arial;
  padding: 20px;
}
textarea {
  width: 100%;
  height: 120px;
  margin-bottom: 10px;
}
button {
  padding: 10px;
  width: 100%;
}
#result {
  margin-top: 20px;
  white-space: pre-wrap;
}
</style>
</head>
<body>

<h1>Asesor Legal IA</h1>

<textarea id="input" placeholder="Describe tu caso..."></textarea>
<button onclick="analizar()">Analizar</button>

<div id="result"></div>

<script>
const API_KEY = "AIzaSyAdyQNVaytWV8PwHAMx9UxKy1D2OUvs8rM";

async function analizar() {
  const text = document.getElementById("input").value;
  const result = document.getElementById("result");

  result.innerHTML = "Analizando...";

  try {
    const res = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=" + API_KEY, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        contents: [
          {
            parts: [
              { text: "Eres un asesor legal en España. Responde claro y directo.\n\nCaso: " + text }
            ]
          }
        ]
      })
    });

    const data = await res.json();

    if (data.candidates && data.candidates.length > 0) {
      const parts = data.candidates[0].content.parts;
      result.innerHTML = parts.map(p => p.text).join("");
    } else {
      result.innerHTML = "Sin respuesta.";
    }

  } catch (e) {
    result.innerHTML = "Error: " + e.message;
  }
}
</script>

</body>
</html>
