<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asesor Legal Personal</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a26;--border:#2a2a3e;--accent:#e8c547;--accent2:#ff4757;--text:#e8e8f0;--muted:#6b6b8a;--green:#2ecc71}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(232,197,71,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(232,197,71,0.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:0 16px 60px}
header{padding:28px 0 20px;border-bottom:1px solid var(--border)}
.badge{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:8px}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,10vw,80px);letter-spacing:2px;line-height:1}
h1 span{color:var(--accent)}
.sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--muted);margin-top:8px;letter-spacing:1px}
.disclaimer{background:rgba(255,71,87,0.07);border:1px solid rgba(255,71,87,0.25);border-left:3px solid var(--accent2);padding:10px 14px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#ff8a96;margin-top:14px;line-height:1.6}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:13px 6px;background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all 0.2s;text-align:center}
.tab.active{color:var(--accent);border-bottom:2px solid var(--accent)}
.tab-content{display:none;padding:24px 0}
.tab-content.active{display:block}
.ai-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:10px}
textarea{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:'IBM Plex Sans',sans-serif;font-size:14px;padding:14px;resize:vertical;min-height:120px;outline:none;line-height:1.6}
textarea:focus{border-color:var(--accent)}
textarea::placeholder{color:var(--muted)}
.btn{background:var(--accent);color:var(--bg);border:none;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px;cursor:pointer;width:100%;margin-top:10px;transition:all 0.15s}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.response-box{background:var(--surface);border:1px solid var(--border);padding:20px;display:none;margin-top:14px}
.response-box.show{display:block}
.response-header{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--accent);text-transform:uppercase;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.response-text{font-size:14px;line-height:1.8;white-space:pre-wrap}
.response-text strong{color:var(--accent)}
.loading-txt{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="badge">&#9658; Uso personal &mdash; Orientacion legal</div>
  <h1>ASESOR <span>LEGAL</span></h1>
  <div class="sub">// Actuaciones policiales · Derechos fundamentales · España</div>
  <div class="disclaimer">&#9888; AVISO: Esta herramienta es orientativa. No reemplaza a un abogado real.<br>En situaciones graves, exige siempre abogado antes de hablar.</div>
</header>

<div class="tabs">
  <button class="tab active" onclick="showTab('caso',this)">Mi caso</button>
</div>

<div id="tab-caso" class="tab-content active">
  <div class="ai-label">Describe tu situacion</div>
  <textarea id="caseInput" placeholder="Cuentame que paso..."></textarea>
  <button class="btn" id="caseBtn" onclick="analyzeCase()">ANALIZAR MI CASO</button>
  <div class="response-box" id="caseBox">
    <div class="response-header">&#9658; Analisis de tu situacion</div>
    <div class="response-text" id="caseResult"></div>
  </div>
</div>

</div>

<script>
const SYSTEM = "Eres un asesor legal experto en derechos fundamentales y actuaciones policiales en España. Responde directo y claro.";

async function callGemini(prompt) {
  try {
    const res = await fetch("/api/gemini", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt: SYSTEM + "\n\n" + prompt })
    });
    const data = await res.json();
    return data.text || "Sin respuesta";
  } catch (e) {
    return "Error: " + e.message;
  }
}

function fmt(t) {
  return t.replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>").replace(/\*(.*?)\*/g, "<em>$1</em>");
}

async function analyzeCase() {
  const input = document.getElementById("caseInput").value.trim();
  if (!input) return;
  const btn = document.getElementById("caseBtn");
  const box = document.getElementById("caseBox");
  const result = document.getElementById("caseResult");

  btn.disabled = true;
  btn.textContent = "ANALIZANDO...";
  box.classList.add("show");
  result.innerHTML = "<span class='loading-txt'>Analizando tu caso…</span>";

  const text = await callGemini(input);
  result.innerHTML = fmt(text);

  btn.disabled = false;
  btn.textContent = "ANALIZAR MI CASO";
}

function showTab(name, btn) {
  document.querySelectorAll(".tab-content").forEach(t => t.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  document.getElementById("tab-" + name).classList.add("active");
  btn.classList.add("active");
}
</script>

</body>
</html>
